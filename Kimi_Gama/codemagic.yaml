workflows:
  build-apk:
    name: Build Android APK
    environment:
      flutter: 3.22.0
      xcode: latest
    scripts:
      - name: Clean previous builds
        script: |
          rm -rf android ios
          
      - name: Create fresh Flutter project
        script: |
          mkdir -p /tmp/fresh
          cd /tmp/fresh
          flutter create --org com.kimigama --project-name kimigama .
          cd $CM_BUILD_DIR
          cp -r lib /tmp/fresh/
          cp -r assets /tmp/fresh/ 2>/dev/null || true
          cp pubspec.yaml /tmp/fresh/
          cp .env /tmp/fresh/ 2>/dev/null || true
          rm -rf lib assets pubspec.yaml .env android ios
          cp -r /tmp/fresh/. .
          rm -rf /tmp/fresh
          
      - name: Setup Android project
        script: |
          # إنشاء مجلدات assets
          mkdir -p assets/images assets/icons assets/fonts
          
          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          
          # تحديث gradle-wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          
          # تحديث settings.gradle
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.7.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          SETTINGS
          
          # تحديث app/build.gradle
          cat > android/app/build.gradle << 'APP'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode', '1')
          def flutterVersionName = localProperties.getProperty('flutter.versionName', '1.0')
          
          android {
              namespace "com.kimigama.app"
              compileSdkVersion 34
              ndkVersion "27.0.12077973"
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
              
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              
              defaultConfig {
                  applicationId "com.kimigama.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }
              
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          
          flutter {
              source '../..'
          }
          
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
              implementation 'androidx.multidex:multidex:2.0.1'
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          APP
          
      - name: Get Flutter packages
        script: flutter pub get
        
      - name: Build Android APK
        script: flutter build apk --release --split-per-abi
        
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
