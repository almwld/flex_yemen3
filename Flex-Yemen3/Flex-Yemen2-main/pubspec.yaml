name: flex_yemen
description: Flex Yemen Market - السوق الإلكتروني اليمني
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  supabase_flutter: ^2.0.0
  carousel_slider: ^5.1.2
  flutter_animate: ^4.3.0
  flutter_svg: ^2.0.17
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  url_launcher: ^6.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  connectivity_plus: ^6.0.5
  share_plus: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/

dependency_overrides:
  share_plus: ^10.1.4
  share_plus_platform_interface: ^5.0.0
